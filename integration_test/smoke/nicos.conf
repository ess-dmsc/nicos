[nicos]
setup_package = "integration_test"
instrument = "smoke"
setup_subdirs = ["smoke"]
services = ["cache", "poller", "collector", "daemon"]
# The smoke runner generates a per-run copy of this config with temp paths.
# These fallback paths keep manual INSTRUMENT=integration_test.smoke use
# outside the repository.
pid_path = "/tmp/nicos-smoke-manual/pid"
logging_path = "/tmp/nicos-smoke-manual/log"
keystorepaths = ["/tmp/nicos-smoke-manual/keystore"]

[environment]
DEFAULT_EPICS_PROTOCOL = "pva"
EPICS_CA_AUTO_ADDR_LIST = "NO"
EPICS_CA_ADDR_LIST = "127.0.0.1"
EPICS_PVA_AUTO_ADDR_LIST = "NO"
EPICS_PVA_ADDR_LIST = "127.0.0.1"
# Explicitly disable SASL for local plain-text smoke Kafka.
KAFKA_SSL_PROTOCOL = ""
KAFKA_SSL_MECHANISM = ""
KAFKA_CERT_PATH = ""
KAFKA_USER = ""
