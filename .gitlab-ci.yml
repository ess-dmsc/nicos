workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG

default:
  tags:
    - docker

variables:
  UV_LINK_MODE: copy

stages:
  - test
  - publish

tests_py312_cov:
  stage: test
  image: registry.esss.lu.se/ecdc/ess-dmsc/docker-almalinux9-conan:1.6.0
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - uv sync --extra gui --all-packages
  script:
    - uv run pytest test/ --cov=nicos --cov=nicos_ess --cov-report term --cov-report xml:coverage.xml --junitxml=test-output.xml
  coverage: /TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/
  artifacts:
    paths:
      - test-output.xml
      - coverage.xml
    reports:
      junit: test-output.xml
  variables:
    UV_PYTHON: 3.12

tests_py3xx:
  stage: test
  image: registry.esss.lu.se/ecdc/ess-dmsc/docker-almalinux9-conan:1.6.0
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - uv sync --extra gui --all-packages
  script:
    - uv run pytest test/ --junitxml=test-output.xml
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.13", "3.14"]
  artifacts:
    paths:
      - test-output.xml
    reports:
      junit: test-output.xml
  variables:
    UV_PYTHON: $PYTHON_VERSION

tests_gui_qt6_py313:
  stage: test
  image: registry.esss.lu.se/ecdc/ess-dmsc/docker-almalinux9-conan:1.6.0
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - uv sync --extra gui-qt6 --all-packages
  script:
    - |
      set +e
      echo "=== Qt6 diagnostic: environment ==="
      echo "PWD=$PWD"
      echo "CI_PROJECT_DIR=$CI_PROJECT_DIR"
      echo "UV_PYTHON=$UV_PYTHON"
      echo "NICOS_QT=$NICOS_QT"
      echo "PYTEST_QT_API=$PYTEST_QT_API"
      uv --version
      uv run --extra gui-qt6 --no-sync python --version
      uname -a
      getconf GNU_LIBC_VERSION || true

      echo "=== Qt6 diagnostic: PyQt6 package location ==="
      pyqt6_dir="$(uv run --extra gui-qt6 --no-sync python -c "import importlib.util; spec = importlib.util.find_spec('PyQt6'); print(spec.submodule_search_locations[0] if spec and spec.submodule_search_locations else '')")"
      echo "PyQt6 dir: ${pyqt6_dir:-<not found>}"

      if [ -n "$pyqt6_dir" ]; then
        qtcore_so="$pyqt6_dir/QtCore.abi3.so"
        qt6_lib_dir="$pyqt6_dir/Qt6/lib"
        qt6core_so="$qt6_lib_dir/libQt6Core.so.6"

        echo "=== Qt6 diagnostic: expected files ==="
        ls -ld "$pyqt6_dir" "$qt6_lib_dir" 2>&1 || true
        ls -l "$qtcore_so" "$qt6core_so" 2>&1 || true

        echo "=== Qt6 diagnostic: nearby PyQt6 files ==="
        find "$pyqt6_dir" -maxdepth 3 \( -name 'QtCore*.so' -o -name 'libQt6Core.so*' -o -name 'libicui18n.so*' -o -name 'libicuuc.so*' -o -name 'libicudata.so*' \) -print 2>&1 || true

        echo "=== Qt6 diagnostic: QtCore dynamic section ==="
        readelf -d "$qtcore_so" 2>&1 | grep -E 'RUNPATH|RPATH|NEEDED' || true

        echo "=== Qt6 diagnostic: Qt6Core ABI tag ==="
        readelf -n "$qt6core_so" 2>&1 || true
        objdump -s -j .note.ABI-tag "$qt6core_so" 2>&1 || true

        echo "=== Qt6 diagnostic: QtCore ldd ==="
        ldd "$qtcore_so" 2>&1 || true
      fi

      echo "=== Qt6 diagnostic: explicit QtCore import ==="
      uv run --extra gui-qt6 --no-sync python -c "from PyQt6.QtCore import QT_VERSION_STR; print(QT_VERSION_STR)"
      import_status=$?
      echo "QtCore import exit status: $import_status"

      if [ "$import_status" -ne 0 ]; then
        echo "=== Qt6 diagnostic: dynamic loader search for QtCore import ==="
        LD_DEBUG=libs uv run --extra gui-qt6 --no-sync python -c "from PyQt6.QtCore import QT_VERSION_STR; print(QT_VERSION_STR)" 2>&1 | tail -n 250 || true
      fi
      set -e
    - uv run --extra gui-qt6 --no-sync pytest test/nicos_ess/gui --junitxml=test-output-gui-qt6.xml
  artifacts:
    paths:
      - test-output-gui-qt6.xml
    reports:
      junit: test-output-gui-qt6.xml
  variables:
    UV_PYTHON: 3.13
    NICOS_QT: "6"
    PYTEST_QT_API: pyqt6

publish:
  stage: publish
  image: registry.esss.lu.se/ecdc/ess-dmsc/docker-almalinux9-conan:1.6.0
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - uv build --all-packages
    - uv publish --index ecdc-pypi
  rules:
    - if: $CI_COMMIT_TAG
  variables:
    UV_PUBLISH_USERNAME: "ecdc"
    UV_PUBLISH_PASSWORD: "$ESS_ARTIFACTORY_ECDC_PYPI_TOKEN"
