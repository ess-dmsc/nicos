workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG

default:
  tags:
    - docker

variables:
  UV_LINK_MODE: copy

stages:
  - test
  - lint
  - format

tests_py312_cov:
  stage: test
  image: registry.esss.lu.se/ecdc/ess-dmsc/docker-almalinux9-conan:1.6.0
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - uv sync --extra gui --all-packages
  script:
    - uv run pytest test/ --cov=nicos --cov=nicos_ess --cov-report term --cov-report xml:coverage.xml --junitxml=test-output.xml
  coverage: /TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/
  artifacts:
    paths:
      - test-output.xml
      - coverage.xml
    reports:
      junit: test-output.xml
  variables:
    UV_PYTHON: 3.12

tests_py3xx:
  stage: test
  image: registry.esss.lu.se/ecdc/ess-dmsc/docker-almalinux9-conan:1.6.0
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - uv sync --extra gui --all-packages
  script:
    - uv run pytest test/ --junitxml=test-output.xml
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.13", "3.14"]
  artifacts:
    paths:
      - test-output.xml
    reports:
      junit: test-output.xml
  variables:
    UV_PYTHON: $PYTHON_VERSION


.lint:
  stage: lint
  image: registry.esss.lu.se/ecdc/ess-dmsc/docker-almalinux9-conan:1.6.0
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    # Fetching only up to the closest merge-base to save time
    - git fetch --depth 1 origin $CI_MERGE_REQUEST_DIFF_BASE_SHA
    # Diff only changed files within MR
    - export CHANGES=$(git diff-tree --name-only -r $CI_MERGE_REQUEST_DIFF_BASE_SHA $CI_COMMIT_SHA)
    - echo "Changed files (to be linted): $CHANGES"
    - uv sync --extra gui --all-packages
    - uv pip install ruff
    - uv pip install codespell
  variables:
    UV_PYTHON: 3.12

lint:check_setups:
  extends:
    - .lint
  script:
    - find ./nicos_ess -type d -name setups -exec uv run tools/check-setups \{\} \;  > >(tee -a check_setups_stdout.log) 2> >(tee -a check_setups_stderr.log >&2)
    - test -z "$(cat check_setups_stdout.log | grep ERROR)" || exit 1 # errors found
    - test ! -f check_setups_stderr.log || exit 1  # failure on check
    - test ! -f check_setups_stdout.log || exit 100 # warnings found
  allow_failure:
    exit_codes: # User defined exit code
      - 100

lint:ruff:
  extends:
    - .lint
  script:
    - uv run ruff check --output-format=gitlab | tee code-quality-report.json
  artifacts:
    reports:
      codequality: code-quality-report.json


lint:codespell:
  extends:
    - .lint
  script:
    - |
      if [ -n "$CHANGES" ]; then
        echo "Running codespell on changed files:"
        echo "$CHANGES"
        uv run python -m codespell_lib $CHANGES
      else
        echo "No modified files to check with codespell."
      fi


.format:
  stage: format
  image: registry.esss.lu.se/ecdc/ess-dmsc/docker-almalinux9-conan:1.6.0
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - uv sync --extra gui --all-packages
    - uv pip install ruff
  variables:
    UV_PYTHON: 3.12


format:ruff:
  extends:
    - .format
  script:
    - uv run ruff format --diff
