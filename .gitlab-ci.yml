workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG

default:
  tags:
    - docker
  image: $ALMALINUX9_IMAGE
  cache:
    - key:
        files:
          - uv.lock
      paths:
        - $UV_CACHE_DIR
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - echo "Running uv with UV_CACHE_DIR=$UV_CACHE_DIR"
    - uv sync --extra gui --all-packages --group gui-test
  after_script:
    - uv cache prune --ci


variables:
  UV_LINK_MODE: copy
  ALMALINUX9_IMAGE: registry.esss.lu.se/ecdc/ess-dmsc/docker-almalinux9-nicos:0.0.1
  UV_CACHE_DIR: .uv-cache


stages:
  - publish
  - lint
  - test
  - integration
  - docs


tests_py312_cov:
  stage: test
  script:
    - uv run pytest test/ --cov=nicos --cov=nicos_ess --cov-report term --cov-report xml:coverage.xml --junitxml=test-output.xml
  coverage: /TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/
  artifacts:
    paths:
      - test-output.xml
      - coverage.xml
    reports:
      junit: test-output.xml
  variables:
    UV_PYTHON: 3.12


tests_py3xx:
  stage: test
  script:
    - uv run pytest test/ --junitxml=test-output.xml
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.13", "3.14"]
  artifacts:
    paths:
      - test-output.xml
    reports:
      junit: test-output.xml
  variables:
    UV_PYTHON: $PYTHON_VERSION

tests_gui_qt6_py313:
  stage: test
  tags:
    - docker
    - ubuntu_2204
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - echo "Running uv with UV_CACHE_DIR=$UV_CACHE_DIR"
    - uv sync --extra gui_qt6 --all-packages --group gui-test
  script:
    - uv run pytest test/nicos_ess/gui --junitxml=test-output-gui-qt6.xml
  artifacts:
    paths:
      - test-output-gui-qt6.xml
    reports:
      junit: test-output-gui-qt6.xml
  variables:
    UV_PYTHON: 3.13
    NICOS_QT: "6"
    PYTEST_QT_API: pyqt6


integration-smoke:
  stage: integration
  image: docker:28-cli
  variables:
    HTTP_PROXY: $ESS_HTTP_PROXY
    HTTPS_PROXY: $ESS_HTTP_PROXY
    http_proxy: $ESS_HTTP_PROXY
    https_proxy: $ESS_HTTP_PROXY
    NO_PROXY: "localhost,127.0.0.1,kafka"
    no_proxy: "localhost,127.0.0.1,kafka"
  before_script: []
  script:
    - rm -rf smoke-artifacts
    - mkdir -p smoke-artifacts
    # The shared Docker daemon needs per-job compose names to avoid collisions.
    - export COMPOSE_PROJECT_NAME="nicos-smoke-${CI_JOB_ID:-local}"
    - docker info > smoke-artifacts/docker-info.log 2>&1
    - docker_exit=$?
    - cat smoke-artifacts/docker-info.log
    - if [ "$docker_exit" -ne 0 ]; then exit "$docker_exit"; fi
    - set +e
    - docker compose -f integration_test/smoke/docker-compose.yml --profile ci build --progress plain nicos-integration > smoke-artifacts/docker-build.log 2>&1
    - build_exit=$?
    - cat smoke-artifacts/docker-build.log
    - if [ "$build_exit" -ne 0 ]; then exit "$build_exit"; fi
    - docker compose -f integration_test/smoke/docker-compose.yml --profile ci up --abort-on-container-exit --exit-code-from nicos-integration > smoke-artifacts/docker-compose-up.log 2>&1
    - test_exit=$?
    - cat smoke-artifacts/docker-compose-up.log
    - docker compose -f integration_test/smoke/docker-compose.yml ps -a > smoke-artifacts/docker-compose-ps.txt 2>&1 || true
    - docker compose -f integration_test/smoke/docker-compose.yml logs --no-color > smoke-artifacts/docker-compose.log 2>&1 || true
    - docker compose -f integration_test/smoke/docker-compose.yml cp nicos-integration:/workspace/smoke-artifacts/. smoke-artifacts/ || true
    - docker compose -f integration_test/smoke/docker-compose.yml down -v --remove-orphans || true
    - if [ ! -f smoke-artifacts/smoke-junit.xml ]; then echo "smoke-junit.xml was not produced"; if [ "$test_exit" -eq 0 ]; then test_exit=1; fi; fi
    - exit "$test_exit"
  artifacts:
    when: always
    paths:
      - smoke-artifacts/smoke-junit.xml
      - smoke-artifacts/log/
      - smoke-artifacts/docker-build.log
      - smoke-artifacts/docker-compose-up.log
      - smoke-artifacts/docker-compose-ps.txt
      - smoke-artifacts/docker-compose.log
      - smoke-artifacts/docker-info.log
    reports:
      junit: smoke-artifacts/smoke-junit.xml


docs:
  stage: docs
  needs: []
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - echo "Running uv with UV_CACHE_DIR=$UV_CACHE_DIR"
    # The gui extra is needed because doc/ext/nicosclassdoc.py imports
    # nicos.guisupport at build time.
    - uv sync --extra gui --all-packages --group docs
  script:
    - uv run sphinx-build -b html doc/source public
  artifacts:
    paths:
      - public
    expire_in: 1 week
  variables:
    UV_PYTHON: "3.13"


pages:
  stage: docs
  needs:
    - job: docs
      artifacts: true
  before_script: []
  after_script: []
  script:
    - echo "Publishing documentation to GitLab Pages"
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH


publish:
  stage: publish
  script:
    - uv build --all-packages
    - uv publish --index ecdc-pypi
  rules:
    - if: $CI_COMMIT_TAG
  variables:
    UV_PUBLISH_USERNAME: "ecdc"
    UV_PUBLISH_PASSWORD: "$ESS_ARTIFACTORY_ECDC_PYPI_TOKEN"


.lint:
  stage: lint
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - echo "Running uv with UV_CACHE_DIR=$UV_CACHE_DIR"
    - uv sync --extra gui --all-packages
    - git fetch --depth 1 origin $CI_MERGE_REQUEST_DIFF_BASE_SHA  # Fetching only up to the closest merge-base to save time
    - export CHANGES=$(git diff-tree --name-only --diff-filter=ACM -r $CI_MERGE_REQUEST_DIFF_BASE_SHA $CI_COMMIT_SHA)  # Diff only changed files within MR
    - export PY_CHANGES=$(git diff-tree --name-only --diff-filter=ACM -r $CI_MERGE_REQUEST_DIFF_BASE_SHA $CI_COMMIT_SHA | grep -e '\.py$')
  allow_failure:
    exit_codes: # User defined exit code
      - 100

lint:check_setups:
  extends:
    - .lint
  script:
    - find ./nicos_ess -type d -name setups -exec uv run tools/check-setups \{\} \;  > >(tee -a check_setups_stdout.log) 2> >(tee -a check_setups_stderr.log >&2)
    - test -z "$(cat check_setups_stdout.log | grep ERROR)" || exit 1 # errors found
    - test ! -s check_setups_stderr.log || exit 1  # failure on check
    - test ! -s check_setups_stdout.log || exit 100 # warnings found

